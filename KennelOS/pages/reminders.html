<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reminders — KennelOS</title>
  <link rel="stylesheet" href="../assets/app.css">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../assets/icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#122138">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KennelOS">
</head>
<body>
  <div id="app-nav"></div>
  <main>
    <div class="page-header">
      <div>
        <h1>Reminders</h1>
        <p class="page-subtitle">Every event with a reminder date — overdue first. Dismiss when handled, or snooze to a later day.</p>
      </div>
      <div class="pill-row">
        <label class="check-inline"><input type="checkbox" id="show-dismissed"> Show dismissed</label>
      </div>
    </div>

    <div id="page-error"></div>
    <div id="reminders-body"></div>
  </main>

  <script type="module" src="../app.js"></script>
  <script type="module" src="./reminders.js"></script>
</body>
</html>
